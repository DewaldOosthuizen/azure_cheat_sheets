# Per-repo orchestrator analysis configuration.
# Generated by workspace-orchestrator. Edit freely — it will not be
# overwritten once it exists.
#
# analysis.*.enabled   : run the tool for this repo
# analysis.*.sync      : force re-run even when artefacts already exist
# analysis.*.untrack   : artefact paths to add to .gitignore (tool-noise)
# analysis.openspec.track : commit openspec/changes to the repo
# analysis.agent.*     : LLM agent rendering + .gitignore maintenance

analysis:

  graphify:
    enabled: false

  understand_anything:
    enabled: false

  codegraph:
    enabled: false

  openspec:
    changeset_dir: "openspec/changes"
    track: false

  agent:
    instructions: true
    update_gitignore: true
