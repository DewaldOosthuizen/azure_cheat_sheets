site_name: Tech Cheat Sheets
site_description: >-
  Quick-reference study notes for tech certifications and architecture decisions.
  Currently focused on Microsoft Azure, organised by domain.
site_url: https://tech-cheat-sheets-and-notes.vercel.app/
repo_name: DewaldOosthuizen/tech-cheat-sheets-and-notes
repo_url: https://github.com/DewaldOosthuizen/tech-cheat-sheets-and-notes

docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  # pymdownx.snippets: expands --8<-- "path/to/file" directives.
  # base_path is relative to docs_dir so paths in cheat sheets start
  # with azure/diagrams/ and resolve to docs/azure/diagrams/.
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
  # pymdownx.superfences: enables custom fences.  The mermaid fence
  # emits a <code class="mermaid"> block that Material picks up and
  # renders via the bundled Mermaid JS loader.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          # yamllint disable-line rule:truthy
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
  - admonition

nav:
  - Home: index.md
  - Azure:
      - Abbreviations: azure/files/abbreviations/abbreviations.md
      - Exam Coverage: azure/files/exams/exams.md
      - Networking: azure/files/networking/networking.md
      - Security: azure/files/security/security.md
      - Storage: azure/files/storage/storage.md
      - Migration: azure/files/migration/migration.md
      - Monitoring & Observability: azure/files/monitoring/monitoring.md
      - Compute: azure/files/compute/compute.md
      - Identity & Access: azure/files/identity/identity.md
      - High Availability & DR: azure/files/ha-dr/ha-dr.md
      - Governance: azure/files/governance/governance.md
      - Messaging & Integration: azure/files/messaging/messaging.md
      - Well-Architected Framework: azure/files/waf/waf.md
  - AWS:
      - Abbreviations: aws/files/abbreviations/abbreviations.md
      - Exam Coverage: aws/files/exams/exams.md
      - Compute: aws/files/compute/compute.md
      - Networking: aws/files/networking/networking.md
      - Storage: aws/files/storage/storage.md
      - Identity & Access: aws/files/identity/identity.md
      - Security: aws/files/security/security.md
      - Database: aws/files/database/database.md
      - Monitoring & Observability: aws/files/monitoring/monitoring.md
      - Messaging & Integration: aws/files/messaging/messaging.md
      - Governance: aws/files/governance/governance.md
      - High Availability & DR: aws/files/ha-dr/ha-dr.md
      - Well-Architected Framework: aws/files/waf/waf.md
