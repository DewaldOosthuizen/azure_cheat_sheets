name: Lint

on:
  push:
    branches:
      - main
  pull_request:

env:
  PYTHON_VERSION: "3.11"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v23.2.0
        with:
          globs: |
            docs/**/*.md
            README.md
            AGENTS.md

  mermaid-check:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_CONFIG_FILE: /tmp/puppeteer-config.json
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: 'npm'
      - name: Install mermaid-cli
        run: npm ci
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Expose local bin on PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> $GITHUB_PATH
      - name: Write puppeteer config
        run: echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer-config.json
      - name: Validate Mermaid diagrams
        run: |
          python3 scripts/validate_mermaid.py \
            docs/azure/cheat_sheets/AZ-305.md \
            docs/azure/cheat_sheets/AZ-104.md \
            $(find docs/azure/diagrams -name '*.mmd' | sort)

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install docs deps
        run: pip install -r requirements-docs.txt
      - name: Build MkDocs site (strict)
        run: mkdocs build --strict

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: Install dev deps
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check scripts/ tests/
      - name: Format check
        run: ruff format --check scripts/ tests/
      - name: Audit Python dependencies
        run: pip-audit

  python-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev deps
        run: pip install -e '.[dev]'
      - name: Run tests
        run: pytest tests/ -v --cov=scripts --cov-report=term-missing --cov-fail-under=90

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >-
            --verbose --no-progress
            --retry-wait-time 5 --max-retries 3 --timeout 30
            docs/**/*.md README.md CONTRIBUTING.md AGENTS.md
          fail: true
